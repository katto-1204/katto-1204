```yaml
name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Main metrics card
      - name: Generate main metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_followup: yes
          plugin_followup_sections: repositories

      # Secondary metrics card (NO habits or achievements)
      - name: Generate secondary metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-right-1.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_lines: yes
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_languages: yes
          plugin_languages_sections: most-used, recently-used
          plugin_topics: yes
          plugin_topics_mode: icons

      # Generate Skyline
      - name: Generate ASCII Skyline
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          gh extension install github/gh-skyline

          gh skyline --user katto-1204 --year 2024 --art-only > skyline.txt

          python << EOF
          import re

          with open("skyline.txt", encoding="utf-8") as f:
              skyline = f.read()

          with open("README.md", encoding="utf-8") as f:
              readme = f.read()

          skyline = re.sub(r'\x1B(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])', '', skyline)

          pattern = r'<!-- skyline start -->.*?<!-- skyline end -->'

          replacement = f'''<!-- skyline start -->
<pre>
{skyline}
</pre>
<!-- skyline end -->'''

          readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme)
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet || git commit -m "Update GitHub Skyline"
          git push
```
